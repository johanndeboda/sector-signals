name: Daily hiring scrape

on:
  schedule:
    - cron: "17 9 * * *"      # daily at 09:17 UTC (~2 AM PT)
  workflow_dispatch:           # also run manually from the Actions tab

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 40

    env:                       # Neon creds, pulled from your repo secrets
      DB_HOST: ${{ secrets.DB_HOST }}
      DB_PORT: ${{ secrets.DB_PORT }}
      DB_NAME: ${{ secrets.DB_NAME }}
      DB_USER: ${{ secrets.DB_USER }}
      DB_PASSWORD: ${{ secrets.DB_PASSWORD }}

    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: '3.13'

      - name: Install Python deps
        run: pip install psycopg2-binary requests beautifulsoup4 python-dotenv

      - name: Run the scrape
        run: python etl/load_hiring.py